---
name: Report Failure and Notify Slack
description: |
    This GitHub composite action imports secrets from HashiCorp Vault and sends a Slack notification in case of a workflow failure.
    It helps automate incident reporting and ensures timely notifications to the relevant Slack channel.
    Use it with `if: failure()`

inputs:
    vault_addr:
        description: The address of the Vault instance
        required: true
    vault_role_id:
        description: The role ID used for authentication with Vault
        required: true
    vault_secret_id:
        description: The secret ID used for authentication with Vault
        required: true
    slack_channel_id:
        description: The Slack channel ID where the notification will be sent.
        default: C076N4G1162 # infraex-alerts
    slack_mention_people:
        description: The Slack people to mention in the notification.
        default: '@infraex-medic'
    disable_silence_check:
        description: |
            Disable silence check.
            By default, alerts can be disabled by creating an issue in the repository
            with the label alert-management and with the title:
            silence: name of your workflow
        required: false
        default: 'false'
    branch:
        description: |
            The branch the workflow is testing. Used to add severity context to the Slack alert.
            Defaults to auto-detection: `github.base_ref` for PRs (target branch),
            `github.ref_name` for push/schedule events.
            Alerts on `stable/*` branches include a prominent severity marker.
        required: false
        default: ''

runs:
    using: composite
    steps:
        - name: Generate token for GitHub
          id: generate-github-token
          # Always generate: the token is consumed by both the silence-check
          # step and the analyzer trigger step, so gating it on
          # disable_silence_check leaves the trigger step without a token
          # when the silence check is disabled.
          uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@732a017b858dbc516d87dbe0780fafb770532ed7 # main
          with:
              github-app-id-vault-key: GITHUB_APP_ID
              github-app-id-vault-path: secret/data/products/infrastructure-experience/ci/common
              github-app-private-key-vault-key: GITHUB_APP_PRIVATE_KEY
              github-app-private-key-vault-path: secret/data/products/infrastructure-experience/ci/common
              vault-auth-method: approle
              vault-auth-role-id: ${{ inputs.vault_role_id }}
              vault-auth-secret-id: ${{ inputs.vault_secret_id }}
              vault-url: ${{ inputs.vault_addr }}
              # we generate a token with access to all assigned repos for the analyzer trigger
              owner: camunda
              repositories: '!all'

        - name: Check for Silence Issue
          id: silence-check
          if: ${{ inputs.disable_silence_check == 'false' }}
          shell: bash
          continue-on-error: true
          run: |
              ISSUE_TITLE="silence: ${{ github.workflow }}"
              ISSUE_SEARCH=$(gh issue list --repo ${{ github.repository }} --state open --search "$ISSUE_TITLE in:title" --label "alert-management" --json number,title,url)
              ISSUE_COUNT=$(echo "$ISSUE_SEARCH" | jq '. | length')

              if [ "$ISSUE_COUNT" -gt 0 ]; then
                ISSUE_TITLE=$(echo "$ISSUE_SEARCH" | jq -r '.[0].title')
                ISSUE_URL=$(echo "$ISSUE_SEARCH" | jq -r '.[0].url')
                echo "Issue found: $ISSUE_TITLE - $ISSUE_URL . Skipping notification. Close this issue to re-enable notifications."
                exit 0
              else
                echo "No silence issue found, triggering the slack alert."
                exit 1
              fi
          env:
              GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}

        - name: Prepare notification context
          id: context
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          shell: bash
          env:
              BRANCH_INPUT: ${{ inputs.branch }}
              DEFAULT_BRANCH: ${{ github.base_ref || github.ref_name }}
              MENTION: ${{ inputs.slack_mention_people }}
              REPO_NAME: ${{ github.event.repository.name }}
              REPO_URL: ${{ github.server_url }}/${{ github.repository }}
              WORKFLOW_NAME: ${{ github.workflow }}
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          run: |
              set -euo pipefail

              # Resolve branch: explicit input > PR base ref (target branch) > current ref
              BRANCH="$BRANCH_INPUT"
              if [[ -z "$BRANCH" ]]; then
                BRANCH="$DEFAULT_BRANCH"
              fi

              # Severity prefix for stable/* branches (production-relevant failures)
              if [[ "$BRANCH" == stable/* ]]; then
                SEVERITY_PREFIX=":rotating_light: *STABLE BRANCH FAILURE* :rotating_light:"
              else
                SEVERITY_PREFIX=""
              fi

              # Mention suffix — omit entirely if slack_mention_people is empty
              if [[ -n "$MENTION" ]]; then
                MENTION_SUFFIX=" (cc $MENTION)"
              else
                MENTION_SUFFIX=""
              fi

              # Build the final message strings here so the payload step only has to
              # pass them through toJSON() — no further interpolation, no injection risk.
              if [[ -n "$SEVERITY_PREFIX" ]]; then
                TEXT_PLAIN="$SEVERITY_PREFIX $REPO_NAME workflow: $WORKFLOW_NAME failed on $BRANCH! Please check: $WORKFLOW_URL$MENTION_SUFFIX"
                BLOCK_PREFIX="$SEVERITY_PREFIX"$'\n'
              else
                TEXT_PLAIN="$REPO_NAME workflow: $WORKFLOW_NAME failed on $BRANCH! Please check: $WORKFLOW_URL$MENTION_SUFFIX"
                BLOCK_PREFIX=""
              fi
              TEXT_BLOCK="${BLOCK_PREFIX}:automation-platform-failure: :mechanic: <${REPO_URL}|[${REPO_NAME}]> workflow: ${WORKFLOW_NAME} failed!"$'\n'":seedling: Branch: \`${BRANCH}\`"$'\n'":link: Please check: ${WORKFLOW_URL}${MENTION_SUFFIX}"

              {
                echo "branch_name=$BRANCH"
                # Multiline-safe output using GitHub Actions delimiters
                echo "text_plain<<EOF_TEXT_PLAIN"
                printf '%s\n' "$TEXT_PLAIN"
                echo "EOF_TEXT_PLAIN"
                echo "text_block<<EOF_TEXT_BLOCK"
                printf '%s\n' "$TEXT_BLOCK"
                echo "EOF_TEXT_BLOCK"
              } >> "$GITHUB_OUTPUT"

        - name: Import Secrets
          id: secrets
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
          with:
              url: ${{ inputs.vault_addr }}
              method: approle
              roleId: ${{ inputs.vault_role_id }}
              secretId: ${{ inputs.vault_secret_id }}
              exportEnv: false
              secrets: |
                  secret/data/products/infrastructure-experience/ci/common SLACK_BOT_TOKEN;

        - name: Notify in Slack in case of failure
          id: slack-notification
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
          with:
              method: chat.postMessage
              token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
              payload: |
                  {
                    "channel": ${{ toJSON(inputs.slack_channel_id) }},
                    "unfurl_links": false,
                    "unfurl_media": false,
                    "text": ${{ toJSON(steps.context.outputs.text_plain) }},
                    "blocks": [
                      {
                        "type": "section",
                        "text": {
                          "type": "mrkdwn",
                          "text": ${{ toJSON(steps.context.outputs.text_block) }}
                        }
                      }
                    ]
                  }
          env:
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        - name: Trigger GHA Failure Log Analyzer
          id: trigger-analyzer
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          shell: bash
          run: |
              echo "Triggering GHA Failure Log Analyzer workflow..."
              gh workflow run "GHA Failure Log Analyzer" \
                --repo camunda/infraex-common-config \
                --field run_url="${{ env.WORKFLOW_URL }}" \
                --field slack_channel_id="${{ inputs.slack_channel_id }}" \
                --field slack_thread_ts="${{ steps.slack-notification.outputs.ts }}"

              echo "GHA Failure Log Analyzer triggered successfully"
          env:
              GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
