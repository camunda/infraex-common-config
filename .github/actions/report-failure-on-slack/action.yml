---
name: Report Failure and Notify Slack
description: |
    This GitHub composite action imports secrets from HashiCorp Vault and sends a Slack notification in case of a workflow failure.
    It helps automate incident reporting and ensures timely notifications to the relevant Slack channel.
    Use it with `if: failure()`

inputs:
    vault_addr:
        description: The address of the Vault instance
        required: true
    vault_role_id:
        description: The role ID used for authentication with Vault
        required: true
    vault_secret_id:
        description: The secret ID used for authentication with Vault
        required: true
    slack_channel_id:
        description: The Slack channel ID where the notification will be sent.
        default: C076N4G1162 # infraex-alerts
    slack_mention_people:
        description: The Slack people to mention in the notification.
        default: '@infraex-medic'
    disable_silence_check:
        description: |
            Disable silence check.
            By default, alerts can be disabled by creating an issue in the repository
            with the label alert-management and with the title:
            silence: name of your workflow
        required: false
        default: 'false'
    branch:
        description: |
            The branch the workflow is testing. Used to add severity context to the Slack alert.
            Defaults to auto-detection: `github.base_ref` for PRs (target branch),
            `github.ref_name` for push/schedule events.
            Alerts on `stable/*` branches include a prominent severity marker.
        required: false
        default: ''
    repeat_threshold:
        description: |
            Number of consecutive failures at or above which the alert is prefixed with a
            "REPEATED FAILURE (Nx)" escalation marker. Set to `0` to disable the prefix
            (the count is still tracked and exposed as the `consecutive_failures` output).
        required: false
        default: '3'
    stale_failure_days:
        description: |
            Window (in days) used to decide whether a stored failure count is still
            "consecutive". If the previous failure is older than this, the counter resets
            to 1. This is a coarse stand-in for an on-success reset, which we cannot
            implement from a failure-only action.
        required: false
        default: '7'
    disable_consecutive_failure_tracking:
        description: |
            Skip the GitHub Actions cache round-trip used to track consecutive failures.
            Useful for repos or workflows where cache writes are undesirable, or for
            debugging. When disabled, `consecutive_failures` is reported as `1`.
        required: false
        default: 'false'

outputs:
    consecutive_failures:
        description: |
            Number of consecutive failures observed for this workflow + branch combination
            within the `stale_failure_days` window (always `1` if tracking is disabled or
            no prior cache entry exists).
        value: ${{ steps.failure-counter.outputs.consecutive_failures }}

runs:
    using: composite
    steps:
        - name: Generate token for GitHub
          id: generate-github-token
          # Always generate: the token is consumed by both the silence-check
          # step and the analyzer trigger step, so gating it on
          # disable_silence_check leaves the trigger step without a token
          # when the silence check is disabled.
          uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@904d7adf2271547148b10f026dadf0d01d564b36 # main
          with:
              github-app-id-vault-key: GITHUB_APP_ID
              github-app-id-vault-path: secret/data/products/infrastructure-experience/ci/common
              github-app-private-key-vault-key: GITHUB_APP_PRIVATE_KEY
              github-app-private-key-vault-path: secret/data/products/infrastructure-experience/ci/common
              vault-auth-method: approle
              vault-auth-role-id: ${{ inputs.vault_role_id }}
              vault-auth-secret-id: ${{ inputs.vault_secret_id }}
              vault-url: ${{ inputs.vault_addr }}
              # we generate a token with access to all assigned repos for the analyzer trigger
              owner: camunda
              repositories: '!all'

        - name: Check for Silence Issue
          id: silence-check
          if: ${{ inputs.disable_silence_check == 'false' }}
          shell: bash
          continue-on-error: true
          run: |
              ISSUE_TITLE="silence: ${{ github.workflow }}"
              ISSUE_SEARCH=$(gh issue list --repo ${{ github.repository }} --state open --search "$ISSUE_TITLE in:title" --label "alert-management" --json number,title,url)
              ISSUE_COUNT=$(echo "$ISSUE_SEARCH" | jq '. | length')

              if [ "$ISSUE_COUNT" -gt 0 ]; then
                ISSUE_TITLE=$(echo "$ISSUE_SEARCH" | jq -r '.[0].title')
                ISSUE_URL=$(echo "$ISSUE_SEARCH" | jq -r '.[0].url')
                echo "Issue found: $ISSUE_TITLE - $ISSUE_URL . Skipping notification. Close this issue to re-enable notifications."
                exit 0
              else
                echo "No silence issue found, triggering the slack alert."
                exit 1
              fi
          env:
              GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}

        - name: Compute failure cache key
          id: cache-key
          if: ${{ steps.silence-check.outcome != 'success' && inputs.disable_consecutive_failure_tracking != 'true' }}
          shell: bash
          env:
              WORKFLOW: ${{ github.workflow }}
              REF: ${{ github.base_ref || github.ref_name }}
          run: |
              set -euo pipefail
              # Hash the workflow+branch pair so the cache key is stable across runs
              # (required for restore-keys prefix matching) but free of characters
              # that GitHub cache keys reject. 32 hex chars keeps the key compact.
              BUCKET=$(printf '%s|%s' "$WORKFLOW" "$REF" | shasum -a 256 | cut -d' ' -f1 | cut -c1-32)
              STATE_PATH="${RUNNER_TEMP}/slack-failure-state.json"
              {
                echo "bucket=$BUCKET"
                echo "primary=slack-failure-count-${BUCKET}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
                echo "prefix=slack-failure-count-${BUCKET}-"
                echo "state_path=$STATE_PATH"
              } >> "$GITHUB_OUTPUT"

        - name: Restore previous failure count
          id: cache-restore
          if: ${{ steps.silence-check.outcome != 'success' && inputs.disable_consecutive_failure_tracking != 'true' }}
          uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
          with:
              path: ${{ steps.cache-key.outputs.state_path }}
              key: ${{ steps.cache-key.outputs.primary }}
              restore-keys: |
                  ${{ steps.cache-key.outputs.prefix }}

        - name: Update failure counter
          id: failure-counter
          if: ${{ steps.silence-check.outcome != 'success' }}
          shell: bash
          env:
              STATE_PATH: ${{ steps.cache-key.outputs.state_path }}
              STALE_DAYS: ${{ inputs.stale_failure_days }}
              DISABLED: ${{ inputs.disable_consecutive_failure_tracking }}
          run: |
              set -euo pipefail

              if [[ "$DISABLED" == "true" ]]; then
                echo "Consecutive-failure tracking disabled via input."
                echo "consecutive_failures=1" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              PREVIOUS_COUNT=0
              PREVIOUS_TS=""
              if [[ -f "$STATE_PATH" ]]; then
                PREVIOUS_COUNT=$(jq -r '.count // 0' < "$STATE_PATH")
                PREVIOUS_TS=$(jq -r '.last_failure_utc // ""' < "$STATE_PATH")
              fi

              NOW_EPOCH=$(date -u +%s)
              NOW_ISO=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

              # The action only runs on failure, so we cannot reset the counter on
              # success. Use a time-based fallback: if the previous failure is older
              # than STALE_DAYS, treat the streak as broken.
              if [[ -n "$PREVIOUS_TS" && "$PREVIOUS_COUNT" -gt 0 ]]; then
                PREV_EPOCH=$(date -u -d "$PREVIOUS_TS" +%s 2>/dev/null \
                  || date -u -j -f '%Y-%m-%dT%H:%M:%SZ' "$PREVIOUS_TS" +%s 2>/dev/null \
                  || echo 0)
                AGE_DAYS=$(( (NOW_EPOCH - PREV_EPOCH) / 86400 ))
                if (( AGE_DAYS > STALE_DAYS )); then
                  echo "Previous failure ($PREVIOUS_TS) is $AGE_DAYS day(s) old (> $STALE_DAYS); resetting streak."
                  PREVIOUS_COUNT=0
                fi
              fi

              NEW_COUNT=$(( PREVIOUS_COUNT + 1 ))
              echo "Consecutive failures for this workflow+branch: $NEW_COUNT (previous: $PREVIOUS_COUNT)"

              mkdir -p "$(dirname "$STATE_PATH")"
              jq -n --argjson count "$NEW_COUNT" --arg ts "$NOW_ISO" \
                '{count: $count, last_failure_utc: $ts}' > "$STATE_PATH"

              echo "consecutive_failures=$NEW_COUNT" >> "$GITHUB_OUTPUT"

        - name: Persist failure count
          if: ${{ steps.silence-check.outcome != 'success' && inputs.disable_consecutive_failure_tracking != 'true' }}
          uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
          with:
              path: ${{ steps.cache-key.outputs.state_path }}
              key: ${{ steps.cache-key.outputs.primary }}

        - name: Prepare notification context
          id: context
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          shell: bash
          env:
              BRANCH_INPUT: ${{ inputs.branch }}
              CONSECUTIVE_FAILURES: ${{ steps.failure-counter.outputs.consecutive_failures }}
              DEFAULT_BRANCH: ${{ github.base_ref || github.ref_name }}
              MENTION: ${{ inputs.slack_mention_people }}
              REPEAT_THRESHOLD: ${{ inputs.repeat_threshold }}
              REPO_NAME: ${{ github.event.repository.name }}
              REPO_URL: ${{ github.server_url }}/${{ github.repository }}
              WORKFLOW_NAME: ${{ github.workflow }}
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          run: |
              set -euo pipefail

              # Resolve branch: explicit input > PR base ref (target branch) > current ref
              BRANCH="$BRANCH_INPUT"
              if [[ -z "$BRANCH" ]]; then
                BRANCH="$DEFAULT_BRANCH"
              fi

              # Collect severity labels (repeated-failure escalation + stable-branch marker)
              # into a single :rotating_light: frame to avoid emoji spam.
              PREFIX_LABELS=()
              if [[ "${REPEAT_THRESHOLD:-0}" -gt 0 && "${CONSECUTIVE_FAILURES:-1}" -ge "${REPEAT_THRESHOLD}" ]]; then
                PREFIX_LABELS+=("REPEATED FAILURE (${CONSECUTIVE_FAILURES}x)")
              fi
              if [[ "$BRANCH" == stable/* ]]; then
                PREFIX_LABELS+=("STABLE BRANCH FAILURE")
              fi

              SEVERITY_PREFIX=""
              if (( ${#PREFIX_LABELS[@]} > 0 )); then
                JOINED=$(IFS=" — "; printf '%s' "${PREFIX_LABELS[*]}")
                SEVERITY_PREFIX=":rotating_light: *${JOINED}* :rotating_light:"
              fi

              # Mention suffix — omit entirely if slack_mention_people is empty
              if [[ -n "$MENTION" ]]; then
                MENTION_SUFFIX=" (cc $MENTION)"
              else
                MENTION_SUFFIX=""
              fi

              # Build the final message strings here so the payload step only has to
              # pass them through toJSON() — no further interpolation, no injection risk.
              if [[ -n "$SEVERITY_PREFIX" ]]; then
                TEXT_PLAIN="$SEVERITY_PREFIX $REPO_NAME workflow: $WORKFLOW_NAME failed on $BRANCH! Please check: $WORKFLOW_URL$MENTION_SUFFIX"
                BLOCK_PREFIX="$SEVERITY_PREFIX"$'\n'
              else
                TEXT_PLAIN="$REPO_NAME workflow: $WORKFLOW_NAME failed on $BRANCH! Please check: $WORKFLOW_URL$MENTION_SUFFIX"
                BLOCK_PREFIX=""
              fi
              TEXT_BLOCK="${BLOCK_PREFIX}:automation-platform-failure: :mechanic: <${REPO_URL}|[${REPO_NAME}]> workflow: ${WORKFLOW_NAME} failed!"$'\n'":seedling: Branch: \`${BRANCH}\`"$'\n'":link: Please check: ${WORKFLOW_URL}${MENTION_SUFFIX}"

              {
                echo "branch_name=$BRANCH"
                # Multiline-safe output using GitHub Actions delimiters
                echo "text_plain<<EOF_TEXT_PLAIN"
                printf '%s\n' "$TEXT_PLAIN"
                echo "EOF_TEXT_PLAIN"
                echo "text_block<<EOF_TEXT_BLOCK"
                printf '%s\n' "$TEXT_BLOCK"
                echo "EOF_TEXT_BLOCK"
              } >> "$GITHUB_OUTPUT"

        - name: Import Secrets
          id: secrets
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
          with:
              url: ${{ inputs.vault_addr }}
              method: approle
              roleId: ${{ inputs.vault_role_id }}
              secretId: ${{ inputs.vault_secret_id }}
              exportEnv: false
              secrets: |
                  secret/data/products/infrastructure-experience/ci/common SLACK_BOT_TOKEN;

        - name: Notify in Slack in case of failure
          id: slack-notification
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
          with:
              method: chat.postMessage
              token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
              payload: |
                  {
                    "channel": ${{ toJSON(inputs.slack_channel_id) }},
                    "unfurl_links": false,
                    "unfurl_media": false,
                    "text": ${{ toJSON(steps.context.outputs.text_plain) }},
                    "blocks": [
                      {
                        "type": "section",
                        "text": {
                          "type": "mrkdwn",
                          "text": ${{ toJSON(steps.context.outputs.text_block) }}
                        }
                      }
                    ]
                  }
          env:
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        - name: Trigger GHA Failure Log Analyzer
          id: trigger-analyzer
          if: ${{ steps.silence-check.outcome != 'success' }} # in case of success it means that a silence issue exists
          shell: bash
          run: |
              echo "Triggering GHA Failure Log Analyzer workflow..."
              gh workflow run "GHA Failure Log Analyzer" \
                --repo camunda/infraex-common-config \
                --field run_url="${{ env.WORKFLOW_URL }}" \
                --field slack_channel_id="${{ inputs.slack_channel_id }}" \
                --field slack_thread_ts="${{ steps.slack-notification.outputs.ts }}"

              echo "GHA Failure Log Analyzer triggered successfully"
          env:
              GH_TOKEN: ${{ steps.generate-github-token.outputs.token }}
              WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
